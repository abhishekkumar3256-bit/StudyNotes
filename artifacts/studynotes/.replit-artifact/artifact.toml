kind = "web"
previewPath = "/"
title = "StudyNotes Pro"
version = "1.0.0"
id = "artifacts/studynotes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19071

[services.development]
run = "pnpm --filter @workspace/studynotes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studynotes", "run", "build" ]
publicDir = "artifacts/studynotes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19071"
BASE_PATH = "/"
